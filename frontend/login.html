<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Serverless Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-banner">
            <h1>Task Master</h1>
            <p>Smart work management on Serverless platform.</p>
        </div>
        
        <div class="login-form-wrapper">
            <div class="login-form">
                <h2>Welcome back!</h2>
            
                <form id="authForm">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="email" required placeholder="nhap@email.com">
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Sign In</button>
                </form>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
